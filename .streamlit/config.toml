[global]

# If false, makes your Streamlit script startup faster by not enabling config options that are not viewed in the browser.
# Default: true
showWarningOnDirectExecution = false

[server]

# List of folders that should not be watched for changes. This impacts both "Run on Save" and @st.cache.
# Relative paths will be taken as relative to the current working directory.
# Example: ['/home/user/project', '../dir']
# Default: []
folderWatchBlacklist = ['']

# Change the type of file watcher used by Streamlit, or turn it off completely.
# Allowed values: "auto", "watchdog", "poll", "none"
# Default: "auto"
fileWatcherType = "none"

# Symmetric key used to produce signed cookies. If deploying on multiple replicas, this should be set to the same value across all replicas to ensure they all validate cookies from each other.
# Default: randomly generated secret key.
# cookieSecret = "randomly-generated-secret-key"

# If false, will attempt to open a new tab or window every time Streamlit is called. If true, will only open a new tab the first time Streamlit is called.
# Default: true
newBrowserSession = false

# Controls whether uncaught app exceptions are displayed in the browser. By default, this is set to True and Streamlit displays app exceptions and associated tracebacks in the browser.
# If set to False, an exception will be shown in the browser as a generic warning message.
# Default: true
showErrorDetails = false

# Controls whether to show the "Please wait..." message while a page is loading.
# Default: true
showSidebarNavigation = true

# Controls whether to enable st.cache. If false, Streamlit will not use the cache.
# Default: true
enableCORS = false

# Enables support for Cross-Origin Request Sharing (CORS) protection, for added security.
# Default: true
enableXsrfProtection = true

# Max size, in megabytes, for files uploaded with the file_uploader.
# Default: 200
maxUploadSize = 200

# Max size, in megabytes, of messages that can be sent via the WebSocket connection.
# Default: 200
maxMessageSize = 200

# Max size, in megabytes, of the websocket message queue.
# Default: 100
maxFrameSize = 100

[browser]

# Internet address where users should point their browsers in order to connect to the app.
# Can be IP address or DNS name and path.
# This is used to:
# - Set the correct URL for CORS and XSRF protection.
# - Show the URL in the terminal when the app is started.
# Default: "localhost"
serverAddress = "0.0.0.0"

# Whether to send usage statistics to Streamlit.
# Default: true
gatherUsageStats = false

# Port where Streamlit should listen for client and browser connections.
# Default: 8501
serverPort = 8501

# The base path for the URL where Streamlit should be reachable from.
# Default: ""
serverBaseUrlPath = ""

# Enables support for websocket compression.
# Default: true
enableWebsocketCompression = true